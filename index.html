<head>

<body>
  <div class="long-form-body">
    <div id="points-canvas"></div>

    <div class="floatlist">
      <div class="header"> jay baptista</div>
      <div class="item">
        Physics Ph.D. candidate at <a href="https://www.stanford.edu">Stanford</a>.
        <br>
        B.S. Astrophysics at <a href="https://www.yale.edu">Yale</a>.
        <br>        
      </div>

      <div>
        <div class='floatlist'>
          <a class='bullet' href="https://github.com/jaybaptista">github</a>
          <a class='bullet' href="cv.pdf">curriculum vitae</a>
          <span class='bullet email-reveal'>email<span class="email-colon">: </span><span class="email-wrapper"><span class="email-address">jay marie at stanford dot edu</span></span></span>
          <div class="email-mobile-reveal">jay marie at stanford dot edu</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js';

    const container = document.getElementById('points-canvas');
    const size = container.clientWidth;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(size, size);
    renderer.setClearColor(0xF0EEE6);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
    camera.position.z = 2.8;

    const N = 3000;
    const positions = new Float32Array(N * 3);
    let i = 0;
    while (i < N) {
      const x = Math.random() * 2 - 1;
      const y = Math.random() * 2 - 1;
      const z = Math.random() * 2 - 1;
      if (x * x + y * y + z * z <= 1) {
        positions[i * 3]     = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        i++;
      }
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({ color: 0xBF4D43, size: 0.018 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    function animate() {
      requestAnimationFrame(animate);
      points.rotation.y += 0.004;
      points.rotation.x += 0.0015;
      renderer.render(scene, camera);
    }
    animate();

    document.querySelector('.email-reveal').addEventListener('click', () => {
      if (window.innerWidth < 1080) {
        document.querySelector('.email-mobile-reveal').classList.toggle('visible');
      }
    });
  </script>
</body>
